<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="28" ry="28" fill="url(#bgGrad)"/>

  <!-- Outer border -->
  <rect x="2" y="2" width="508" height="508" rx="26" ry="26"
        fill="none" stroke="#2a2a2a" stroke-width="2"/>

  <!-- Inner inset border -->
  <rect x="22" y="22" width="468" height="468" rx="10" ry="10"
        fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Corner brackets - top left -->
  <polyline points="22,70 22,22 70,22" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Corner brackets - top right -->
  <polyline points="442,22 490,22 490,70" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Corner brackets - bottom left -->
  <polyline points="22,442 22,490 70,490" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6"/>
  <!-- Corner brackets - bottom right -->
  <polyline points="490,442 490,490 442,490" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.6"/>

  <!-- Thin horizontal accent lines -->
  <rect x="22" y="160" width="468" height="1" fill="url(#accentLine)" opacity="0.3"/>
  <rect x="22" y="352" width="468" height="1" fill="url(#accentLine)" opacity="0.3"/>

  <!-- AR Letters -->
  <text
    x="256"
    y="308"
    text-anchor="middle"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="210"
    font-weight="700"
    letter-spacing="-6"
    fill="url(#letterGrad)"
  >AR</text>

  <!-- Thin underline under letters -->
  <rect x="120" y="328" width="272" height="1.5" fill="#ffffff" opacity="0.2"/>

  <!-- Bottom label -->
  <text
    x="256"
    y="430"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="18"
    fill="#ffffff"
    opacity="0.25"
    letter-spacing="10"
  >ALEXANDER ROSS</text>

  <!-- Top tiny label -->
  <text
    x="256"
    y="100"
    text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="13"
    fill="#ffffff"
    opacity="0.18"
    letter-spacing="6"
  >alexrosstrabajo-design</text>
</svg>
