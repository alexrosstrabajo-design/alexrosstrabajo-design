name: Generate Pacman Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: hugoalh/github-graphql-client-ghaction@v1
        id: pacman
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Anes-Benomar/pacman-contribution-graph@main
        with:
          github_user_name: alexrosstrabajo-design
          outputs: |
            dist/pacman-contribution-graph.svg
            dist/pacman-contribution-graph-dark.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
